  function SpaEfV_Tbl_1_Data(jsonString, instanzName, einJahr){
    this.jsonData = JSON.parse(jsonString);
    this.years = null;
    this.energietraeger = [];
    this.instanzname = instanzName;
    this.onlyOneYear = einJahr;
    }
    SpaEfV_Tbl_1_Data.prototype.getInstanzname = function(){
      return this.instanzname;
    }
    SpaEfV_Tbl_1_Data.prototype.setYears = function(){
      var neuesYear;
      var years = [];

      years[0] = this.jsonData[0].Jahr;
      for(var i = 1; i < this.jsonData.length; i++) {
        neuesYear = true;
        for(var j = 0; j < years.length; j++) {
          if(this.jsonData[i].Jahr == years[j]) {
            neuesYear = false;
            break;
          }
        }
        if(neuesYear && this.jsonData[i].Jahr != "") {
          years[years.length] = this.jsonData[i].Jahr
        }
      }
      years.sort();
      this.years = years;
    }
    SpaEfV_Tbl_1_Data.prototype.getYears = function(){

      return this.years;

    }
    SpaEfV_Tbl_1_Data.prototype.setEnergietraeger = function(){
      var neuerEnt;
      var energietraeger = [];

      energietraeger[0] = this.jsonData[0].Energietraeger;
      for(var i = 1; i < this.jsonData.length; i++){
        neuerEnt = true;
        for(var j = 0; j < energietraeger.length; j++){
          if(this.jsonData[i].Energietraeger == energietraeger[j]){
            neuerEnt = false;
            break;
          }
        }
        if(neuerEnt && this.jsonData[i].Energietraeger != ""){
          energietraeger[energietraeger.length] = this.jsonData[i].Energietraeger
        }
      }
      energietraeger.sort();
      this.energietraeger = energietraeger;
    }
    SpaEfV_Tbl_1_Data.prototype.getEnergietraeger = function(){

      return this.energietraeger;

    }
    SpaEfV_Tbl_1_Data.prototype.prepareOutputData = function (){
      this.setYears();
      this.setEnergietraeger();
    }


  var SpaEfV_data = new SpaEfV_Tbl_1_Data(sessionStorage.getItem("jsonString"), sessionStorage.getItem("instanzName"), sessionStorage.getItem("einJahr"));

  SpaEfV_data.prepareOutputData();

  var workbook = new GC.Spread.Sheets.Workbook(document.getElementById("Spreadsheet"), {
                sheetCount: 1
            });
  var charts = [];
  var spSheet = workbook.getSheet(0);
  function saveInDB(){
    var jsonData;
    var jsonString;

    jsonData = workbook.toJSON(false);
    jsonString = JSON.stringify(jsonData);

    $.ajax({
          type: "POST",
          data: {fileName: "SpaEfV_Tbl_1",typ: "Vorlage", jsonData: jsonString, nameDB: "gipscomm" },
          url: "php/Auswertungen/spreadsheetToDB.php",
          success: function (data) {
            alert("The Spreadsheet was successfully saved!");
        }
    });
  }
  function loadFromDB(){
    $.ajax({
          type: "POST",
          data: {berichtstyp: "spaEfvTbl1", fileName: "SpaEfV_Tbl_1", nameDB: "gipscomm"},
          url: "php/Auswertungen/dbToSpreadsheet.php",
          success: function (data) {
            var jsonData = JSON.parse(data);
            jsonData = JSON.parse(jsonData);


            var sheet = jsonData.sheets.SpaEfV_Tabelle_1;
            var sheetData = sheet.data.dataTable;
            var chartData = sheet.charts;
            var rowObj = sheet.rows;
            var hiddenRows = 0;

            var rowIndizes = [6, 38, 70, 102, 134];
            var startRowsJahresuebersicht = [166, 171, 176, 181, 186, 191, 196, 201, 206, 211];
            var maxYears = rowIndizes.length;
            var yearsToHide;
            var maxEnts = startRowsJahresuebersicht.length;
            var years = SpaEfV_data.getYears();
            var ents = SpaEfV_data.getEnergietraeger();
            var nameInstance = SpaEfV_data.getInstanzname();

            //Set header
            sheetData[1][1].value = nameInstance;

            for(var year = 0; year < years.length; year++){
              sheetData[rowIndizes[year]][1].value = years[year];
            }

            // Read-in SpaEfV data
            for(var i = 0; i < years.length; i++){
              for(var j = 0; j < maxEnts; j++){
                if(j < ents.length){
                sheetData[rowIndizes[i] + j][2].value = ents[j];
                for(var k = 0; k < SpaEfV_data.jsonData.length; k++){
                  if(SpaEfV_data.jsonData[k].Jahr == years[i] && SpaEfV_data.jsonData[k].Energietraeger == ents[j]){
                      sheetData[rowIndizes[i] + j][3].formula = "VALUE(" + SpaEfV_data.jsonData[k].Verbrauch + ")";
                      sheetData[rowIndizes[i] + j][5].formula = "VALUE(" + SpaEfV_data.jsonData[k].Kosten + ")";
                      sheetData[rowIndizes[i] + j][7].value = SpaEfV_data.jsonData[k].Messsystem;
                      sheetData[rowIndizes[i] + j][8].formula = "VALUE(" + SpaEfV_data.jsonData[k].Messgenauigkeit + ")";
                  }
                }
              }
              else{
                // Hide rows of empty Energieverbrauchswerte
                var hideRow = rowIndizes[i] + j;

                rowObj[hideRow].visible = false;
                hiddenRows++;

                // Hide rows of empty Jahresübersicht
                for(var testRow = 0; testRow < maxEnts; testRow++){
                  if(sheetData[startRowsJahresuebersicht[j]][2].value == ""){
                    for(var row = 0; row < maxYears; row++){
                      if(rowObj[startRowsJahresuebersicht[j] + row].visible != false ){
                        rowObj[startRowsJahresuebersicht[j] + row].visible = false;
                        hiddenRows++;
                      }
                    }
                  }
                }
              }
              }
            }
            var chartShift = (10 - ents.length) * 20;
            var actualChartShift;
            var lastShift;

            for(var chart = 0; chart < chartData.length - 5; chart += 2){
              if(chart == 0){
                actualChartShift = chartShift * (chart + 1);
              }
              else {
                actualChartShift = lastShift + chartShift;
              }
              chartData[chart].y -= actualChartShift;
              chartData[chart + 1].y -= actualChartShift;
              lastShift = actualChartShift;
            }

            // If there are less years available than the maxYears, the rest should be hidden
            if(maxYears != years.length){
              var indexFirstYearToHide = rowIndizes[years.length] - 2;
              var indexLastYearToHide = rowIndizes[maxYears - 1] + 27;

              for(var yearToHide = indexFirstYearToHide; yearToHide < indexLastYearToHide + 1; yearToHide++){
                rowObj[yearToHide].visible = false;
                hiddenRows++;
              }

              var newChartData1 = [];
              var newChartData2 = [];
              var newChartData = [];
              var startData2Index = 10;

              newChartData1 = chartData.slice(0, years.length * 2);
              newChartData2 = chartData.slice(startData2Index, chartData.length);

              newChartData = newChartData1.concat(newChartData2);
              newChartData = JSON.stringify(newChartData);
              newChartData = JSON.parse(newChartData);


              sheet.charts = newChartData;
            }
            var nCharts = sheet.charts.length;
            var lastChartsShift = hiddenRows * 20 + 10;

            for(var chartIndex = nCharts - 4; chartIndex < nCharts; chartIndex++){
              sheet.charts[chartIndex].y -= lastChartsShift;
            }

            // If there is only one year that should be visualized, everything from the Jahresübersicht down gets deleted
            if(years.length == 1){

              for(var rowToHide = 163; rowToHide < 284; rowToHide++){
                try{
                rowObj[rowToHide].visible = false;
                }
                catch(err){
                  console.log("error: " + rowToHide);
                }
              }
              sheet.charts = chartData.slice(0, nCharts - 4);
            }


            // Set print set print settings
            sheet.printInfo.margin = {
              top: 30,
              bottom: 30,
              left: 30,
              right: 30,
              header: 15,
              footer: 15
            }
            sheet.printInfo.paperSize = {
              height: 1188,
              width: 950,
            }
            sheet.printInfo.zoomFactor = 1;
            sheet.printInfo.orientation = 2;

            workbook.fromJSON(jsonData,{
            });
            spSheet = workbook.getSheet(0);
            var cellVal = [];

            var chartCollection = spSheet.charts.all();
            var nCharts = chartCollection.length;
         }
    });
  }
  loadFromDB();

  $(".e-backstageli").css("display","block");

  var excelIO = new GC.Spread.Excel.IO();

  function exportExcelfile() {
      var fileName = $("#exportFileName").val();
      if (fileName.substr(-5, 5) !== '.xls') {
          fileName += '.xls';
      }
      var json = JSON.stringify(workbook.toJSON());

      excelIO.save(json, function (blob) {
          saveAs(blob, fileName);
      }, function (e) {
          if (e.errorCode === 1) {
              alert(e.errorMessage);
          }
      });
  }

  }

  //Events
  $("#excelExportOfSSheet").click(function(){
    exportExcelfile();

    workbook.print();
  });
