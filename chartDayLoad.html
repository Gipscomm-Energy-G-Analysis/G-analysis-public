
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <link href="Syncfusion/content/bootstrap.min.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="dist/js/jqueryui/jquery-ui.min.css">
    <link type="text/css" rel="stylesheet" href="dist/js/jqueryui/jquery-ui.structure.min.css">
    <link type="text/css" rel="stylesheet" href="dist/js/jqueryui/jquery-ui.theme.css">
    <link href="dist/css/syncfusion/flat-azure-dark/ej.web.all.min.css" rel="stylesheet" />
    <link href="Syncfusion/content/default.css" rel="stylesheet" />
    <link href="Syncfusion/content/default-responsive.css" rel="stylesheet" />
    <link href="dist/css/jquery.dataTables.min.css" rel="stylesheet" />
    <link href="dist/css/dataTables.buttons.min.css" rel="stylesheet" />
    <script src="Syncfusion/scripts/jquery-3.3.1.min.js" type="text/javascript"></script>
    <script  src="dist/js/jqueryui/jquery-ui.min.js"></script>
    <script src="dist/js/loadingOverlay.min.js"></script>
    <!-- Promise lib -->
    <script src="dist/js/bluebird.min.js"></script>
    <script src="dist/js/ej.web.all.min.js" type="text/javascript"></script>
    <script src="Syncfusion/scripts/properties.js" type="text/javascript"></script>
    <script src="dist/js/jquery.dataTables.min.js" type="text/javascript"></script>
    <script src="dist/js/dataTables.buttons.min.js" type="text/javascript"></script>
    <script src="dist/js/buttons.flash.min.js" type="text/javascript"></script>
    <script src="dist/js/jszip.min.js" type="text/javascript"></script>
    <script src="dist/js/pdfmake.min.js" type="text/javascript"></script>
    <script src="dist/js/vfs_fonts.min.js" type="text/javascript"></script>
    <script src="dist/js/buttons.html5.min.js" type="text/javascript"></script>
    <script src="dist/js/buttons.print.min.js" type="text/javascript"></script>
    <script src="dist/js/math.min.js" type="text/javascript"></script>
</head>
<body>
    <h3></h3>
    <label id="lieg"></label>
    <button id="diagSpeichern" style="float:right;margin-bottom:10px;margin-right:25px;">Diagramm speichern</button>
    <div id="bemerkungen">
        <h4>Bemerkungen</h4>
        <div id="bemList" style="padding-left: 20px;">

        </div>
    </div>
    <div class="content-container-fluid">
        <div class="row">
            <div class="cols-sample-area">
                <div id="container"></div>
            </div>
        </div>
    </div>
    <div id="Tooltip" style="display: none;">
        <div id="icon">
            <div id="eficon">
            </div>
        </div>
        <div id="value">
            <div>
                <label id="efpercentage">&nbsp;#point.y#
                </label>
                <label id="ef">Efficiency
                </label>
            </div>
        </div>
    </div>
    <div id="table-chart-data-container_1">
        <label style="font-size: 18px;">Summe-Tag: </label>
        <label id="consumption-day_1" style="font-size: 18px;"></label>
        <br>
        <br>
        <table id="tblChartData_1" class="stripe hover row-border compact dt-left custom">
            <thead>
                <tr>
                    <th>Messstelle</th>
                    <th>Datum</th>
                    <th>Wert[kWh]</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div id="table-chart-data-container_2">
        <label style="font-size: 18px;">Summe-Tag: </label>
        <label id="consumption-day_2" style="font-size: 18px;"></label>
        <br>
        <br>
        <table id="tblChartData_2" class="stripe hover row-border compact dt-left custom">
            <thead>
                <tr>
                    <th>Messstelle</th>
                    <th>Datum</th>
                    <th>Wert[kWh]</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div id="table-chart-data-container_3">
        <label style="font-size: 18px;">Summe-Tag: </label>
        <label id="consumption-day_3" style="font-size: 18px;"></label>
        <br>
        <br>
        <table id="tblChartData_3" class="stripe hover row-border compact dt-left custom">
            <thead>
                <tr>
                    <th>Messstelle</th>
                    <th>Datum</th>
                    <th>Wert[kWh]</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div id="notePopup" style="display:none;">
        <input id="identNote" type="text" name="" placeholder="Name">
        <br>
        <input id="mstIDNote" type="text" name="" placeholder="Messstelle">
        <input id="mstNote" type="text" name="" placeholder="Messstelle">
        <br>
        <textarea id="bemerkungNote" name="name" rows="5" placeholder="Bemerkung"></textarea>
        <br>
        <br>
        <button type="button" id="btnNoteOk">Ok</button>
        <button type="button" id="btnNoteAbbr">Abbrechen</button>
    </div>
    <div id="savePopup" style="display:none;">
        <input type="text" name="" placeholder="Name">
        <br>
        <br>
        <textarea id="bemerkungSave" name="name" rows="3" cols="60" placeholder="Bemerkung"></textarea>
        <br>
        <br>
        <button type="button" id="btnSaveOk">Ok</button>
        <button type="button" id="btnSaveAbbr">Abbrechen</button>
    </div>
    <script type="text/javascript" src="dist/js/fpCore.min.js">
    </script>
    <script type="text/javascript" src="dist/js/DataMachine.min.js">
    </script>
    <script type="text/javascript" src="dist/js/DataTranslator.min.js">
    </script>
    <script type="text/javascript" src="dist/js/objects.min.js">
    </script>
    <script type="text/javascript" src="dist/js/fpChart.min.js">
    </script>
    <script type="text/javascript" src="dist/js/chartDay.min.js">
    </script>
	<link href="dist/css/pace-theme.min.css" rel="stylesheet"/>
    <script src="dist/js/pace.min.js" type="text/javascript"></script>

    <style class="cssStyles">
    #diagSpeichern, #btnNoteAbbr, #btnNoteOk,
    #btnSaveAbbr, #btnSaveOk{
        border: 0px solid black;
        border-radius: 5px;
        background-color: transparent;
        color: black;
        margin: 3px;
        margin-top: 5px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        border: 1px solid
    }
    #diagSpeichern:hover, #btnNoteAbbr:hover, #btnNoteOk:hover{
        color:white;
        background-color: black;
        cursor: pointer;
    }
    html{
        width: 100%;
        padding: 10px;
    }
    label{
        margin-bottom : -25px !important ;
        text-align :center !important;
    }
    .tooltipDivcontainer {
        background-color:#E94649;
        color: white;
        width:130px;
    }
    .content-container-fluid {
        width: 98%;
    }
    #table-chart-data-container_1,
    #table-chart-data-container_2,
    #table-chart-data-container_3 {
        width: 98%;
        border: 1px solid gray;
        padding: 5px;
        margin-bottom: 5px;
    }
    #Tooltip >div:first-child {
        float: left;
    }
    #Tooltip #value {
        float: right;
        height: 50px;
        width: 68px;
    }
    #Tooltip #value >div {
        margin: 5px 5px 5px 5px;
    }
    #Tooltip #efpercentage {
        font-size: 20px;
        font-family: segoe ui;
        padding-left: 2px;
    }
    #Tooltip #ef {
        font-size: 12px;
        font-family: segoe ui;
    }
    #eficon {
        height: 60px;
        width: 60px;
        background-repeat: no-repeat;
    }
    .ui-dialog .ui-dialog-content {
        position: relative;
        padding: .5em 1em;
        background: #B9C0C7;
    }
    .ui-dialog .ui-dialog-titlebar {
        background: #6B6F73;
    }
    .ui-dialog-titlebar{
        width: 92%;
    }
    .ui-widget-content {
        border: 3px solid black;
        background: #B9C0C7;
    }
    .custom {
        font-size: 10px;
    }
    th {
        text-align: left;
        background: transparent;
    }
    .bem{
        color: black;
    }
    .bem:hover{
        color: gray;
    }
    #bemerkungNote, #bemerkungSave{
        width: 367px;
    }
    </style>
</body>
</html>
