                        targets: 1
                    },
                    {

                ]
            }),
            tblChartData_3 = $("#tblChartData_3").DataTable({
                dom: 'Bfrtip',
                buttons: [{

                colReorder: true,
                columnDefs: [{

                    },
                    {
                        width: "33%",

                    {

                    }

        year = sessionStorage.getItem("year"),
            monthArr = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober",
                "November", "Dezember"
            ];
        month = sessionStorage.getItem("month"),
            day = sessionStorage.getItem("day"),
            nameDB = sessionStorage.getItem("nameDB"),
            chartType = sessionStorage.getItem("chartType"),
            displayMean = sessionStorage.getItem("displayMean"),
            nameMst_1 = sessionStorage.getItem("nameMst_1"),
            nameMst_2 = sessionStorage.getItem("nameMst_2"),
            nameMst_3 = sessionStorage.getItem("nameMst_3"),
            queryString_1 = sessionStorage.getItem("queryString_1"),
            queryString_2 = sessionStorage.getItem("queryString_2"),
            queryString_3 = sessionStorage.getItem("queryString_3"),
            csOptions = null;

            let notes = [];
            let msts = [];
            const getNotesDay =
            scpChart.getNotes("day")

            const saveNoteDay =
            scpChart.saveNote("day")

        if (chartType == "line") {
            csOptions = {
                tooltip: {
                    visible: true
                },
                border: {

                },
                marker: {
                    shape: 'circle',
                    size: {

                    visible: true
                }
            }
        }  else if (chartType == "column") {
        csOptions = {
            tooltip: {
                visible: true
            },
            border: {
                width: 2
            },
            marker: {
                shape: 'circle',
                size: {

            }

    } else {

                },

        }

        ///2023
        $("#btnNoteAbbr").click(function () {
            $("#notePopup").dialog("close")
        })
        $("#btnNoteOk").click(function () {
            $("#notePopup").dialog("close")

            // empty note list
            $("#bemList").empty()

            // saves the note created in the dialog
            // then updates the note list
            saveNoteDay(
                    $("#identNote").val()
                )(
                    $("#mstIDNote").val()
                )(
                    $("#bemerkungNote").val()
                )
                .then(
                    () =>
                    pipe(scpChart.getChart("#container"), scpChart.getSeries, scpChart.updateNotesOfVisibleSeries("day"))
                )
                .then(
                    ["#identNote", "#mstIDNote", "#mstNote", "#colorNote", "#bemerkungNote", "#seriesNote"]
                    .forEach(a => $(a).val(""))
                )

            // empty notes array
            notes = []
        });
        $("#btnSaveOk").click(function () {
            $("#savePopup").dialog("close");
            let chart = $("#container").ejChart("instance");
            $.ajax({
                type: 'POST',
                async: true,
                url: 'php/saveDiag.php',
                data: {
                    ins: "saveDiag",
                    nameDB,
                    name: headerDiagramm,
                    typ: "month",
                    jsonDiag: JSON.stringify(chart.model.series.map(a => a.dataSource))
                },
                success: function (records) {
                    alert("Daten gespeichert!");
                }
            });
        });
        $("#diagSpeichern").click(function () {
            alert("Die Möglichkeit Diagramme zu speichern wird in Zukunft verfügbar sein.")
            // $("#savePopup").dialog({
            //     resize: "auto",
            //     show: {
            //         effect: "fade",
            //         duration: 500

            //     },
            //     width: 425,
            //     height: 250
            // });
        });        
        $("#container").ejChart({
            pointRegionClick: function (args) {

        $("#notePopup").dialog({
            resize: "auto",
            show: {
                effect: "fade",
                duration: 500
            },
            hide: {
                effect: "fade",
                duration: 500
            },
            width: 425,
            height: 295
        });

        console.log("args");
        console.log(args);

        $("#identNote").val(
            year + "/" + month + "/" + day + "/" + scpChart.formatDate(String(args.data.region.Region.PointIndex)) + ":00"
        )
        $("#mstIDNote").val(
            msts[args.data.region.SeriesIndex][0]
        )
        $("#mstNote").val(
            msts[args.data.region.SeriesIndex][1]
        )
        $("#colorNote").val(
            msts[args.data.region.SeriesIndex][2]
        )
        $("#seriesNote").val(
            args.data.region.SeriesIndex
        )

        const toTake =
            notes
            .filter(
                a => a[0] === $("#identNote").val() && a[2] == $("#mstIDNote").val()
            )

        $("#bemerkungNote").val(
            toTake.length >= 1 ? toTake[0][4] : ""
        )

        },
            legend: {
                position: "top"
            },
            legendItemClick: function (sender) {

                // empty note list
                $("#bemList").empty()

                // empty notes array
                notes = []

                // select notes which correspond to the visible series
                // and show only those
                pipe(scpChart.getChart("#container"), scpChart.getSeries, scpChart.prepareSeries(sender), scpChart.updateNotesOfVisibleSeries("day"))

            },
            //Initializing Primary X Axis
            primaryXAxis: {
                title: {
                    text: "Uhrzeit"
                }
            },
            //Initializing Primary Y Axis
            primaryYAxis: {
                title: {
                    text: "Leistung[kW/15min]"
                }
            },
            commonSeriesOptions: csOptions,
            series: []
        });

        $("h3").text("Energieverbrauch " + day + " " + monthArr[Number(month) - 1] + " " + year);

        if (queryString_1 != "" && queryString_2 != "" && queryString_3 != "") {
            firstQuery();
            secondQuery();
            thirdQuery();
        } else if (queryString_1 != "" && queryString_2 != "") {
            firstQuery();
            secondQuery();
        } else if (queryString_1 != "") {
            firstQuery();
        } else {
            console.log("There're no query data!!");
        }

        function firstQuery() {
            dataMachine.runQuery("read", nameDB, queryString_1)
                .then(JSON.parse)
                .then(function (data) {
                    let dataTranslator = null,
                        chartData = [],
                        sumDay = 0;
                    dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);

                    console.log(chartData);
                    dataTranslator.sum15minsDay();
                    chartData = dataTranslator.translate(4);
                    for (let i = 0; i < chartData.length; i++) {
                        sumDay += chartData[i].y;
                        tblChartData_1.row.add([
                            chartData[1].name,
                            day + "." + month + "." + year + " " + chartData[i].x,
                            commanFunctionDottoCommaValue(chartData[i].y)
                        ]).draw();
                    }
                    if (sumDay > 0) {
                        updateChart(chartData, nameMst_1);
                        $("#consumption-day_1").text(Math.round(sumDay) + " kWh");
                    } else {
                        alert("Data not available/No Operation in " + nameMst_1);
                        $("#consumption-day_1").text(Math.round(sumDay) +
                            " kWh (Data not available/No Operation) " + nameMst_1);
                    }
                });
        }

        function secondQuery() {
            dataMachine.runQuery("read", nameDB, queryString_2)
                .then(JSON.parse)
                .then(function (data) {
                    let dataTranslator = null,
                        chartData = [],
                        sumDay = 0;
                    dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);

                    dataTranslator.sum15minsDay();
                    chartData = dataTranslator.translate(4);
                    for (let i = 0; i < chartData.length; i++) {
                        sumDay += chartData[i].y;
                        tblChartData_2.row.add([
                            chartData[1].name,
                            day + "." + month + "." + year + " " + chartData[i].x,
                            commanFunctionDottoCommaValue(chartData[i].y)
                        ]).draw();
                    }
                    if (sumDay > 0) {
                        updateChart(chartData, nameMst_2);
                        $("#consumption-day_2").text(Math.round(sumDay / 4) + " kWh");
                    } else {
                        $("#consumption-day_2").text(Math.round(sumDay) +
                            " kWh (Data not available/No Operation) " + nameMst_2);
                    }
                });
        }

        function thirdQuery() {
            dataMachine.runQuery("read", nameDB, queryString_3)
                .then(JSON.parse)
                .then(function (data) {
                    let dataTranslator = null,
                        chartData = [],
                        sumDay = 0;
                    dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);

                    dataTranslator.sum15minsDay();
                    chartData = dataTranslator.translate(4);
                    for (let i = 0; i < chartData.length; i++) {
                        sumDay += chartData[i].y;
                        tblChartData_3.row.add([
                            chartData[1].name,
                            day + "." + month + "." + year + " " + chartData[i].x,
                            commanFunctionDottoCommaValue(chartData[i].y)
                        ]).draw();
                    }
                    if (sumDay > 0) {
                        updateChart(chartData, nameMst_3);
                        $("#consumption-day_3").text(Math.round(sumDay / 4) + " kWh");
                    } else {
                        $("#consumption-day_3").text(Math.round(sumDay) +
                            " kWh (Data not available/No Operation) " + nameMst_3);
                    }

                });
        }

        function commanFunctionDottoCommaValue(value){
            let elementYtoString=value.toString();
            let fristValue =elementYtoString.split('.')[0];
            let lastValue =elementYtoString.split('.')[1];
            let lastValue2 = lastValue?','+lastValue:'';
            let elementYValue= formatComma(fristValue);
            let yMainValue = elementYValue+lastValue2; 
            return yMainValue;
        }

        const formatComma = num => 
            String(num).replace(/(?<!\..*)(\d)(?=(?:\d{3})+(?:\.|$))/g, '$1.')
        ;

        function updateChart(newDataSeries, nameSeries) {
            let chart = $("#container").ejChart("instance");

            chart.model.series.push({
                type: chartType,
                name: nameSeries,
                dataSource: newDataSeries,
                xName: "x",
                yName: "y",
            });
            chart.redraw();
        }
    </script>
