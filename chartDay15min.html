      day = sessionStorage.getItem("day"),
      nameDB = sessionStorage.getItem("nameDB"),
      chartType = sessionStorage.getItem("chartType"),

  $("h3").text("Energieverbrauch " + day + " " + monthArr[Number(month) - 1] + " " + year);

  if(queryString_1 != "" && queryString_2 != "" && queryString_3 != ""){
    firstQuery();
    secondQuery();
    thirdQuery();
  }
  else if (queryString_1 != "" && queryString_2 != "") {
    firstQuery();
    secondQuery();
  }
  else if (queryString_1 != "") {
    firstQuery();
  }
  else {
    console.log("There're no query data!!");
  }

  function firstQuery(){
    dataMachine.runQuery("read", nameDB, queryString_1)
    .then(JSON.parse)
    .then(function(data){
      let dataTranslator = null,
          chartData = [],
          sumDay = 0;
      if(nameDB == "001_heco" /*|| nameDB == "002_badber"*/ || nameDB == "003_tauchzor"){
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_02, data);
      }
      else {
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);
      }
      console.log(chartData);
      dataTranslator.sum15minsDay();
      chartData = dataTranslator.translate(1);
      for(let i = 0; i < chartData.length; i++){
        tblChartData_1.row.add([
          chartData[1].name,
          day + "." + month + "." + year + " " + chartData[i].x,
          chartData[i].y
        ]).draw();
        sumDay += chartData[i].y;
      }
	if(sumDay>0){updateChart(chartData, nameMst_1);
		$("#consumption-day_1").text(Math.round(sumDay/4)+" kWh");}
      	else{alert("Data not available/No Operation in "+nameMst_1);
		$("#consumption-day_1").text(Math.round(sumDay)+" kWh (Data not available/No Operation) "+nameMst_1);}
    });
  }

      }
      if(sumDay>0){updateChart(chartData, nameMst_2); $("#consumption-day_2").text(Math.round(sumDay/4)+" kWh");}
	else{$("#consumption-day_2").text(Math.round(sumDay)+" kWh (Data not available/No Operation) "+nameMst_2);}
    });
  }

  function thirdQuery(){
    dataMachine.runQuery("read", nameDB, queryString_3)
    .then(JSON.parse)

        sumDay += chartData[i].y;
      }
     if(sumDay>0){updateChart(chartData, nameMst_3);
		$("#consumption-day_3").text(Math.round(sumDay/4)+" kWh");}
      	else{$("#consumption-day_3").text(Math.round(sumDay)+" kWh (Data not available/No Operation) "+nameMst_3);}
		
    });
  }

  function updateChart(newDataSeries, nameSeries){
    let chart = $("#container") .ejChart("instance");

    chart.model.series.push({
      type: chartType,
      name: nameSeries,
      dataSource: newDataSeries,
      xName: "x",
      yName: "y",
    });
    chart.redraw();
  }
