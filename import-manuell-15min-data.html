    <script>
    // Function to download a CSV template
    function downloadCSVTemplate() {
        var templateName="template.csv";
        let csvTemplate = [];
        let csvContent = "data:text/csv;charset=utf-8,";
        csvTemplate = [
            ["Channel Name","Time Server","Power","DeviceID"],
            ["Maschine 80 L1","\"2024-12-24  00:30:00\"","7415.50","401"],
            ["Saeule Maschine 80 L1","\"2024-12-25  00:15:00\"","7215.50","402"],
            ["F19-F21 Sortimat 1  L1","\"2024-12-26  02:00:30\"","7015.50","403"],
            ["Kompressor 4 L1","\"2024-12-27  10:00:15\"","7515.50","404"],
            ["Maschine 606 L1","\"2024-12-28  12:15:00\"","7315.50","405"]
        ];
        csvTemplate.forEach(rowArray => {
            let row = rowArray.join(",");
            csvContent += row + "\r\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", templateName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    //start code add radio button option check or uncheck
    document.addEventListener("DOMContentLoaded", function () {
        // Set "Kw/h" as the default checked radio button
        document.getElementById("KWH").checked = true;
    });
    //end code add radio button option check or uncheck    
    $(document).ready(function(){
        ////Download Channel List
        $('#downloadChannelList').on('click', function() {
            // Use jQuery to send an AJAX request
            $.ajax({
                type: "POST",
                async: !0,
                url: "php/getChannelList15min.php",
                data: {
                    nameDB: sessionStorage.getItem("nameDB")
                },
                success: function(data) {
                    // Create a temporary link to download the file
                    const blob = new Blob([data], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'channel-list.csv';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                },
            })
        });
        ////Upload Day Form csv file records
        $('#csvUpload15minForm').on('submit', function(e) {
            e.preventDefault(); // Prevent the default form submission

            // Check if a file is selected
            let fileInput = $('#csvUpload15minForm #csvFile')[0];
            if (fileInput.files.length === 0) {
                alert("Please select a file.");
                return;
            }
            // Create FormData object to hold the CSV file
            let formData = new FormData(this);
            formData.append('nameDB', sessionStorage.getItem("nameDB"));
            formData.append('position', sessionStorage.getItem("position"));
            formData.append('username', sessionStorage.getItem("username"));
            $('#tile_loader_div').show();
            // Use AJAX to send the file to the server
            $.ajax({
                url: 'php/import-manuell-15min-data.php', // Server-side script to process the file
                type: 'POST',
                data: formData,
                contentType: false,  // Important for file uploads
                processData: false,  // Important for file uploads
                success: function(response) {
                    $('#tile_loader_div').hide();
                    $('#csvUpload15minForm').trigger("reset");
                    document.getElementById("KWH").checked = true;
                    $('#result').html(response); // Display success message or errors
                },
                error: function(err) {
                    console.error("Error uploading CSV", err);
                    $('#result').html("<p>Error uploading CSV file.</p>");
                }
            });
        });
    });
    </script>    
</head>

<body>
    <div id="import-data-section">

            <div class="left-sec">
                <a href="/dashboard/" class="custom-button">Back To Dashboard</a>
            </div>
            <div class="right-sec">

                <button class="custom-button" id="downloadChannelList">Download Channel List</button>

            </div>
        </div>
            <div class="title-bar">Import Manuell 15min Data</div>
            <div class="tab-section">
                <!-- form Content -->
                <div id="form-section" class="form-content">

                    <div id="tile_loader_div" style="display: none;">
                        <img src="/dashboard/images/loader_dashboard.gif" id="tile_loader_image">
                    </div>
                    <!-- Upload CSV File -->
                    <div class="form-sec">
                        <form id="csvUpload15minForm" enctype="multipart/form-data">
                            <label>
                                <input type="radio" id="KWH" name="powerUnit" value="KWH" class="radio-option" style="height:16px; width:16px; vertical-align: middle;"> Kw/h
                            </label>
                            <label>

                            <br><br>
                            <label for="csvFile">Select file:</label>
                            <input type="file" id="csvFile" name="csvFile" accept=".csv,.xls,.xlsx" required>
                            <button type="submit" class="custom-button">Upload</button>
                        </form>
                        <p style="font-size: 12px;">Note:- Please upload only file in CSV, XLS or XLSX format.</p>
                        <!-- Result Message -->
                        <div id="result"></div>
                    </div>
                </div>
            </div>
    </div>
