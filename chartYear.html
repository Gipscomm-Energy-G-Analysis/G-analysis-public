  <script type="text/javascript" language="javascript">
  let dataMachine = new DataMachine(),
      tblChartData_1 =  $("#tblChartData_1").DataTable({
          dom: 'Bfrtip',
          buttons: [
            {
              extend: 'copy',
              text: 'Kopieren',
              exportOptions: {
                columns: ':visible'
              }
            },
            {
              extend: 'csv',
              text: 'CSV-Export',
              exportOptions: {
                columns: ':visible'
              }
            },
            {
              extend: 'print',
              text: 'Drucken',
              exportOptions: {
                columns: ':visible'
              }
            }
          ],
          pageLength: 15,
          bAutoWidth: false,
          colReorder: true,
          columnDefs: [{
            width: "33%",
            targets: 0
          },
          {
            width: "33%",
            targets: 1
          },
          {
            width: "33%",
            targets: 2
          }]
        })
      tblChartData_2 =  $("#tblChartData_2").DataTable({
          dom: 'Bfrtip',
          buttons: [
            {
              extend: 'copy',
              text: 'Kopieren',
              exportOptions: {
                columns: ':visible'
              }
            },
            {
              extend: 'csv',
              text: 'CSV-Export',
              exportOptions: {
                columns: ':visible'
              }
            },
            {
              extend: 'print',
              text: 'Drucken',
              exportOptions: {
                columns: ':visible'
              }
            }
          ],
          pageLength: 15,
          bAutoWidth: false,
          colReorder: true,
          columnDefs: [{
            width: "33%",
            targets: 0
          },
          {
            width: "33%",
            targets: 1
          },
          {
            width: "33%",
            targets: 2
          }]
        })
      tblChartData_3 =  $("#tblChartData_3").DataTable({
          dom: 'Bfrtip',
          buttons: [
            {
              extend: 'copy',
              text: 'Kopieren',
              exportOptions: {
                columns: ':visible'
              }
            },
            {
              extend: 'csv',
              text: 'CSV-Export',
              exportOptions: {
                columns: ':visible'
              }
            },
            {
              extend: 'print',
              text: 'Drucken',
              exportOptions: {
                columns: ':visible'
              }
            }
          ],
          pageLength: 15,
          bAutoWidth: false,
          colReorder: true,
          columnDefs: [{
            width: "33%",
            targets: 0
          },
          {
            width: "33%",
            targets: 1
          },
          {
            width: "33%",
            targets: 2
          }]
        })
      year = sessionStorage.getItem("year"),
      monthArr = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
      month = sessionStorage.getItem("month"),
      nameDB = sessionStorage.getItem("nameDB"),
      chartType = sessionStorage.getItem("chartType"),
      displayMean = sessionStorage.getItem("displayMean"),
      nameMst_1 = sessionStorage.getItem("nameMst_1"),
      nameMst_2 = sessionStorage.getItem("nameMst_2"),
      nameMst_3 = sessionStorage.getItem("nameMst_3"),
      queryString_1 = sessionStorage.getItem("queryString_1"),
      queryString_2 = sessionStorage.getItem("queryString_2"),
      queryString_3 = sessionStorage.getItem("queryString_3"),
      csOptions = null;
  if(chartType == "line"){
    csOptions = {
      tooltip: {
        visible : true
      },
        border : {width: 2},
        marker: {
          shape: 'circle',
          size: {
            height: 10, width: 10
          },
          visible: true
        }
    }
  }
  else {
    csOptions = {
      tooltip: {
        visible : true
      },
        border : {width: 2},
        marker: {
          dataLabel: {visible: true}
        }
    }
  }
  $("#container") .ejChart({
        legend: {
          position: "top"
        },
        //Initializing Primary X Axis
        primaryXAxis: {
          title: {
            text: "Monat"
          }
        },
        //Initializing Primary Y Axis
        primaryYAxis: {
          title: {
            text: "Verbrauch[kWh]"
          }
         },
          commonSeriesOptions: csOptions,
          series: []
        });


  $("h3").text("Energieverbrauch " + year);

  if(queryString_1 != "" && queryString_2 != "" && queryString_3 != ""){
    firstQuery();
    secondQuery();
    thirdQuery();
  }
  else if (queryString_1 != "" && queryString_2 != "") {
    firstQuery();
    secondQuery();
  }
  else if (queryString_1 != "") {
    firstQuery();
  }
  else {
    console.log("There're no query data!!");
  }

  function firstQuery(){
    dataMachine.runQuery("read", nameDB, queryString_1)
    .then(JSON.parse)
    .then(function(data){
      let dataTranslator = null,
          chartData = [],
          sumYear = 0;
      if(nameDB == "001_heco" /*|| nameDB == "002_badber"*/ || nameDB == "003_tauchzor"){
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_02, data);
      }
      else {
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);
      }
      dataTranslator.sumMonths();
      chartData = dataTranslator.translate(4);
      for(let i = 0; i < chartData.length; i++){
        tblChartData_1.row.add([
          chartData[i].name,
          chartData[i].x + "." + year,
          chartData[i].y
        ]).draw();
        sumYear += chartData[i].y;
      }
	if(sumYear>0){$("#consumption-year_1").text(Math.round(sumYear) + " kWh");
		updateChart(chartData, nameMst_1);}
      	else{alert("Data not available/No Operation"+nameMst_1);
		$("#consumption-year_1").text(Math.round(sumYear)+" Kwh (Data not available/No Operation)"+nameMst_1);}
      
    });
  }

  function secondQuery(){
    dataMachine.runQuery("read", nameDB, queryString_2)
    .then(JSON.parse)
    .then(function(data){
      let dataTranslator = null,
          chartData = [],
          sumYear = 0;
      if(nameDB == "001_heco" || nameDB == "002_badber" || nameDB == "003_tauchzor"){
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_02, data);
      }
      else {
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);
      }
      dataTranslator.sumMonths();
      chartData = dataTranslator.translate(4);
      for(let i = 0; i < chartData.length; i++){
        tblChartData_2.row.add([
          chartData[i].name,
          chartData[i].x + "." + year,
          chartData[i].y
        ]).draw();
        sumYear += chartData[i].y;
      }
      if(sumYear>0){$("#consumption-year_2").text(Math.round(sumYear) + " kWh");
		 updateChart(chartData, nameMst_2);}
	else{$("#consumption-year_2").text(Math.round(sumYear)+"kWh (Data not available/No Operation)"+nameMst_2);}
     
    });
  }

  function thirdQuery(){
    dataMachine.runQuery("read", nameDB, queryString_3)
    .then(JSON.parse)
    .then(function(data){
      let dataTranslator = null,
          chartData = [],
          sumYear = 0;
      if(nameDB == "001_heco" || nameDB == "002_badber" || nameDB == "003_tauchzor"){
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_02, data);
      }
      else {
        dataTranslator = new DataTranslator(TranslationType.ENERGY_DATA_01, data);
      }

      dataTranslator.sumMonths(year, month);
      chartData = dataTranslator.translate(4);
      for(let i = 0; i < chartData.length; i++){
        tblChartData_3.row.add([
          chartData[i].name,
          chartData[i].x + "." + year,
          chartData[i].y
        ]).draw();
        sumYear += chartData[i].y;
      }
	if(sumYear>0){$("#consumption-year_3").text(Math.round(sumYear)+"kWh");
		 updateChart(chartData, nameMst_3);}
	else{$("#consumption-year_3").text(Math.round(sumYear)+"kWh (Data not available/No Operation)"+nameMst_3);}
       
    });
  }

  function updateChart(newDataSeries, nameSeries){
    let chart = $("#container") .ejChart("instance");

    chart.model.series.push({
      type: chartType,
      name: nameSeries,
      dataSource: newDataSeries,
      xName: "x",
      yName: "y",
    });
    chart.redraw();
  }

  </script>
